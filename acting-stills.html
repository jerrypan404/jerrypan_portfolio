<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acting Gallery | Jerry Pan</title>
    <link rel="stylesheet" href="styles.css?v=gallery-condensed-5" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav-strip" aria-label="Main navigation">
        <a class="brand" href="index.html#home">Jerry Pan</a>
        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
          <span></span>
          <span></span>
          <span></span>
          <span class="sr-only">Toggle navigation</span>
        </button>
        <div class="nav-links" id="site-menu">
          <a class="nav-link" href="index.html#home">Home</a>
          <a class="nav-link active" href="index.html#acting">Acting</a>
          <a class="nav-link" href="index.html#contact">Contact</a>
        </div>
      </nav>
    </header>

    <main class="detail-main acting-stills-main">
      <section class="container detail-panel acting-stills-panel">
        <div class="detail-heading acting-stills-heading">
          <div>
            <p class="eyebrow">Archive</p>
            <h1>Acting Gallery</h1>
          </div>
          <a class="detail-back" href="index.html#acting">Back Home <span aria-hidden="true">-&gt;</span></a>
        </div>

        <section class="gallery-feature-grid" aria-label="Featured acting stills">
          <figure class="gallery-frame gallery-feature-frame">
            <img src="assets/acting-gallery/outb-01.jpg" alt="Black-and-white Once Upon the Time in Boston still with Jerry Pan standing below a window" />
          </figure>
          <div class="gallery-stack" aria-label="Acting portraits and stills">
            <figure class="gallery-frame" style="--focus: 50% 28%;">
              <img src="assets/acting-gallery/bw-portrait-01.jpg" alt="Black-and-white seated portrait of Jerry Pan looking up toward camera" />
            </figure>
            <figure class="gallery-frame">
              <img src="assets/acting-gallery/outb-04.jpg" alt="Blue-toned Once Upon the Time in Boston still of Jerry Pan standing in a dim interior" />
            </figure>
          </div>
        </section>

        <section class="gallery-cluster gallery-cluster-bw" aria-label="Black-and-white acting portraits and behind-the-scenes photos">
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/bw-portrait-04.jpg" alt="Black-and-white portrait of Jerry Pan holding flowers" />
          </figure>
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/bw-bts-01.jpg" alt="Black-and-white behind-the-scenes photo of Jerry Pan beside a cinema camera" />
          </figure>
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/bw-bts-02.jpg" alt="Black-and-white behind-the-scenes photo of Jerry Pan smiling near a camera" />
          </figure>
          <figure class="gallery-frame span-8 wide">
            <img src="assets/acting-gallery/bw-portrait-02.jpg" alt="Wide black-and-white portrait of Jerry Pan seated on carpet" />
          </figure>
        </section>

        <section class="gallery-cluster gallery-cluster-cinema" aria-label="Cinematic acting stills">
          <figure class="gallery-frame span-6 wide">
            <img src="assets/acting-gallery/inner-space-01.png" alt="Inner Space still of Jerry Pan facing a large orange circular wall feature" />
          </figure>
          <figure class="gallery-frame span-6 wide" style="--focus: 44% 48%;">
            <img src="assets/acting-gallery/inner-space-02.png" alt="Warm close-up Inner Space still of Jerry Pan looking to the side" />
          </figure>
          <figure class="gallery-frame span-6 panorama" style="--focus: 42% 50%;">
            <img src="assets/acting-gallery/inner-space-03.png" alt="Extreme close-up Inner Space still of Jerry Pan's eyes in warm light" />
          </figure>
          <figure class="gallery-frame span-6 wide">
            <img src="assets/acting-gallery/inner-space-04.png" alt="Inner Space still of Jerry Pan seated beside another performer in a dim interior" />
          </figure>
          <figure class="gallery-frame span-8 wide">
            <img src="assets/acting-gallery/myosotis-03.jpg" alt="Myosotis still with Xin and Lily sitting together outdoors" />
          </figure>
          <figure class="gallery-frame span-4 tall">
            <img src="assets/acting-gallery/flower-portrait.jpg" alt="Soft portrait of Jerry Pan holding flowers" />
          </figure>
          <figure class="gallery-frame span-4 wide" style="--focus: 46% 42%;">
            <img src="assets/acting-gallery/outb-02.jpg" alt="Blue-toned Once Upon the Time in Boston close-up of Jerry Pan" />
          </figure>
          <figure class="gallery-frame span-4 wide" style="--focus: 58% 48%;">
            <img src="assets/acting-gallery/outb-05.jpg" alt="Warm interior Once Upon the Time in Boston still of Jerry Pan" />
          </figure>
          <figure class="gallery-frame span-4 wide">
            <img src="assets/acting-gallery/outb-08.jpg" alt="Once Upon the Time in Boston still of Jerry Pan on a phone call" />
          </figure>
          <figure class="gallery-frame span-6 wide" style="--focus: 50% 42%;">
            <img src="assets/acting-gallery/outb-10.jpg" alt="Once Upon the Time in Boston still of Jerry Pan lying on a pillow" />
          </figure>
          <figure class="gallery-frame span-6 panorama">
            <img src="assets/acting-gallery/outb-12.jpg" alt="Night exterior still of Jerry Pan smiling" />
          </figure>
          <figure class="gallery-frame span-6 panorama">
            <img src="assets/acting-gallery/outb-13.jpg" alt="Subtitled close-up still of Jerry Pan from a film scene" />
          </figure>
          <figure class="gallery-frame span-6 panorama">
            <img src="assets/acting-gallery/myosotis-09.jpg" alt="Myosotis title still with Xin and Lily walking through a park" />
          </figure>
        </section>

        <section class="gallery-cluster gallery-cluster-bts" aria-label="Behind-the-scenes and candid photos">
          <figure class="gallery-frame span-7 wide">
            <img src="assets/acting-gallery/myosotis-10.jpg" alt="Myosotis behind-the-scenes photo at a table with cast and crew" />
          </figure>
          <figure class="gallery-frame span-5 portrait">
            <img src="assets/acting-gallery/candid-autumn-01.jpg" alt="Autumn candid of Jerry Pan crouching with a camera" />
          </figure>
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/candid-autumn-02.jpg" alt="Close-up candid of Jerry Pan photographing in a blue hoodie" />
          </figure>
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/transit-portrait.jpg" alt="Portrait of Jerry Pan seated on public transit" />
          </figure>
          <figure class="gallery-frame span-4 portrait">
            <img src="assets/acting-gallery/candid-autumn-03.jpg" alt="Autumn portrait of Jerry Pan with a camera" />
          </figure>
          <figure class="gallery-frame span-12 wide">
            <img src="assets/acting-gallery/myosotis-03.jpg" alt="Myosotis outdoor still with Xin beside Lily" />
          </figure>
        </section>
      </section>
    </main>

    <script src="script.js?v=gallery-lightbox"></script>
  </body>
</html>
